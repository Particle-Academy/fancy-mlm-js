name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) requires npm 11.5.1+; the runner's bundled npm
      # is 10.x, so fetch a fresh npm just for publish. NOTE: a brand-new package
      # cannot use OIDC for its FIRST publish — bootstrap once (manual `npm
      # publish` or a temporary NPM_TOKEN), then configure the Trusted Publisher.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
